name: CI Hola Mundo Jolfreilyn

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout de código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Ejecutar script de Hola Mundo CI
      run: python app.py

    # 🚀 ESTE ES EL PASO NUEVO PARA ENVIAR A NTFY
    - name: Enviar notificación a ntfy
      run: |
        curl -H "Title: ✅ 🚀 Nuevo push en main - Jolfreilyn Amancio" \
             -H "Priority: high" \
             -d "Se subió código nuevo al repositorio con éxito por Jolfreilyn Amancio (ID: 2025-1060)." \
             https://ntfy.sh/devops-itla